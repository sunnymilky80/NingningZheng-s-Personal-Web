<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Markdown vs HTML 分工 · 配图 7</title>
<style>
  body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #fafaf7; font-family: -apple-system, "PingFang SC", sans-serif; }
  .wrap { padding: 56px 48px; max-width: 920px; }
  .title { text-align: center; font-size: 22px; color: #222; margin-bottom: 8px; }
  .sub { text-align: center; color: #888; font-size: 14px; margin-bottom: 48px; }
  svg { display: block; margin: 0 auto; }
  .legend { display: flex; justify-content: center; gap: 48px; margin-top: 32px; font-size: 14px; color: #555; }
  .dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; vertical-align: middle; margin-right: 8px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">AI 时代的内容输出分工</div>
  <div class="sub">Markdown 和 HTML 各退到自己最合适的那一侧</div>

  <svg width="820" height="360" viewBox="0 0 820 360" xmlns="http://www.w3.org/2000/svg">
    <!-- 左侧 人写给 AI -->
    <rect x="40" y="40" width="240" height="280" rx="16" fill="#f0ede4" stroke="#d4cdb8" stroke-width="1.5"/>
    <text x="160" y="80" text-anchor="middle" font-size="15" fill="#888" font-weight="500">人写给 AI</text>
    <text x="160" y="130" text-anchor="middle" font-size="44" font-weight="700" fill="#5a4f33">Markdown</text>
    <text x="160" y="170" text-anchor="middle" font-size="13" fill="#888">低摩擦输入语法</text>

    <g transform="translate(80, 200)">
      <text x="0" y="0" font-size="12" fill="#7a7060">· prompt / .md</text>
      <text x="0" y="22" font-size="12" fill="#7a7060">· CLAUDE.md 配置</text>
      <text x="0" y="44" font-size="12" fill="#7a7060">· 日常笔记草稿</text>
      <text x="0" y="66" font-size="12" fill="#7a7060">· README / 文档源</text>
    </g>

    <!-- 中间箭头 -->
    <g transform="translate(290, 180)">
      <line x1="0" y1="0" x2="120" y2="0" stroke="#bbb" stroke-width="2" marker-end="url(#arr)"/>
      <line x1="120" y1="-30" x2="0" y2="-30" stroke="#bbb" stroke-width="2" marker-end="url(#arr2)"/>
      <text x="60" y="-10" text-anchor="middle" font-size="11" fill="#999">协作</text>
      <text x="60" y="22" text-anchor="middle" font-size="11" fill="#999">协作</text>
    </g>

    <!-- 右侧 AI 写给人 -->
    <rect x="540" y="40" width="240" height="280" rx="16" fill="#e8efea" stroke="#b8cdc1" stroke-width="1.5"/>
    <text x="660" y="80" text-anchor="middle" font-size="15" fill="#5a8a6e" font-weight="500">AI 写给人</text>
    <text x="660" y="130" text-anchor="middle" font-size="44" font-weight="700" fill="#2d5a3d">HTML</text>
    <text x="660" y="170" text-anchor="middle" font-size="13" fill="#5a8a6e">高密度可视化输出</text>

    <g transform="translate(580, 200)">
      <text x="0" y="0" font-size="12" fill="#3d6a4f">· 报告 / 规范 / 简历</text>
      <text x="0" y="22" font-size="12" fill="#3d6a4f">· 可视化 diagram</text>
      <text x="0" y="44" font-size="12" fill="#3d6a4f">· 互动 artifact</text>
      <text x="0" y="66" font-size="12" fill="#3d6a4f">· 即开即看的链接</text>
    </g>

    <defs>
      <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
        <path d="M0,0 L0,6 L9,3 z" fill="#bbb"/>
      </marker>
      <marker id="arr2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
        <path d="M0,0 L0,6 L9,3 z" fill="#bbb"/>
      </marker>
    </defs>
  </svg>

  <div class="legend">
    <span><span class="dot" style="background:#bfb389;"></span>人 → 介质 → AI</span>
    <span><span class="dot" style="background:#5a8a6e;"></span>AI → 介质 → 人</span>
  </div>
</div>
</body>
</html>
