<svg viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif">
  <!-- 背景 · bg-paper -->
  <rect width="900" height="360" fill="#FFFDF7"/>

  <!-- 标题 · ink -->
  <text x="450" y="38" font-size="22" font-weight="700" text-anchor="middle" fill="#1F2522">Agent 商业化 5 维度 × 5 场景对比</text>
  <text x="450" y="62" font-size="12" text-anchor="middle" fill="#687168">✓ 满足 · △ 部分满足 · ✗ 不满足</text>

  <g transform="translate(60, 85)">
    <!-- 表头 · ink 深底 + 米白字 -->
    <rect x="0" y="0" width="780" height="42" fill="#2A3530" rx="4"/>
    <text x="60" y="27" fill="#FBF7EE" font-size="13" font-weight="600" text-anchor="middle">场景</text>
    <text x="175" y="27" fill="#FBF7EE" font-size="13" font-weight="600" text-anchor="middle">高频需求</text>
    <text x="285" y="27" fill="#FBF7EE" font-size="13" font-weight="600" text-anchor="middle">数字化工作流</text>
    <text x="395" y="27" fill="#FBF7EE" font-size="13" font-weight="600" text-anchor="middle">可验证结果</text>
    <text x="505" y="27" fill="#FBF7EE" font-size="13" font-weight="600" text-anchor="middle">可量化 ROI</text>
    <text x="615" y="27" fill="#FBF7EE" font-size="13" font-weight="600" text-anchor="middle">成熟付费路径</text>
    <text x="725" y="27" fill="#FBF7EE" font-size="13" font-weight="600" text-anchor="middle">达标项数</text>

    <!-- 行 1: Coding (苔藓绿淡底高亮) -->
    <g transform="translate(0, 50)">
      <rect x="0" y="0" width="780" height="42" fill="#EFF1E9" stroke="#5D7052" stroke-width="1.5" stroke-opacity="0.4"/>
      <text x="60" y="27" font-size="14" font-weight="700" fill="#3D6B54" text-anchor="middle">Coding</text>
      <circle cx="175" cy="21" r="13" fill="#3D6B54"/><text x="175" y="26" font-size="14" font-weight="700" fill="#FBF7EE" text-anchor="middle">✓</text>
      <circle cx="285" cy="21" r="13" fill="#3D6B54"/><text x="285" y="26" font-size="14" font-weight="700" fill="#FBF7EE" text-anchor="middle">✓</text>
      <circle cx="395" cy="21" r="13" fill="#3D6B54"/><text x="395" y="26" font-size="14" font-weight="700" fill="#FBF7EE" text-anchor="middle">✓</text>
      <circle cx="505" cy="21" r="13" fill="#3D6B54"/><text x="505" y="26" font-size="14" font-weight="700" fill="#FBF7EE" text-anchor="middle">✓</text>
      <circle cx="615" cy="21" r="13" fill="#3D6B54"/><text x="615" y="26" font-size="14" font-weight="700" fill="#FBF7EE" text-anchor="middle">✓</text>
      <text x="725" y="27" font-size="15" font-weight="700" fill="#3D6B54" text-anchor="middle">5/5</text>
    </g>

    <!-- 行 2: 客服 -->
    <g transform="translate(0, 92)">
      <rect x="0" y="0" width="780" height="42" fill="#F5F0E3" stroke="#E5DFD0" stroke-width="1"/>
      <text x="60" y="27" font-size="14" font-weight="600" fill="#1F2522" text-anchor="middle">客服</text>
      <circle cx="175" cy="21" r="13" fill="#3D6B54"/><text x="175" y="26" font-size="14" font-weight="700" fill="#FBF7EE" text-anchor="middle">✓</text>
      <circle cx="285" cy="21" r="13" fill="#3D6B54"/><text x="285" y="26" font-size="14" font-weight="700" fill="#FBF7EE" text-anchor="middle">✓</text>
      <circle cx="395" cy="21" r="13" fill="#D4A574"/><text x="395" y="26" font-size="14" font-weight="700" fill="#FBF7EE" text-anchor="middle">△</text>
      <circle cx="505" cy="21" r="13" fill="#3D6B54"/><text x="505" y="26" font-size="14" font-weight="700" fill="#FBF7EE" text-anchor="middle">✓</text>
      <circle cx="615" cy="21" r="13" fill="#3D6B54"/><text x="615" y="26" font-size="14" font-weight="700" fill="#FBF7EE" text-anchor="middle">✓</text>
      <text x="725" y="27" font-size="15" font-weight="700" fill="#1F2522" text-anchor="middle">4/5</text>
    </g>

    <!-- 行 3: 法律 -->
    <g transform="translate(0, 134)">
      <rect x="0" y="0" width="780" height="42" fill="#FFFDF7" stroke="#E5DFD0" stroke-width="1"/>
      <text x="60" y="27" font-size="14" font-weight="600" fill="#1F2522" text-anchor="middle">法律</text>
      <circle cx="175" cy="21" r="13" fill="#D4A574"/><text x="175" y="26" font-size="14" font-weight="700" fill="#FBF7EE" text-anchor="middle">△</text>
      <circle cx="285" cy="21" r="13" fill="#D4A574"/><text x="285" y="26" font-size="14" font-weight="700" fill="#FBF7EE" text-anchor="middle">△</text>
      <circle cx="395" cy="21" r="13" fill="#A05A3E"/><text x="395" y="26" font-size="14" font-weight="700" fill="#FBF7EE" text-anchor="middle">✗</text>
      <circle cx="505" cy="21" r="13" fill="#D4A574"/><text x="505" y="26" font-size="14" font-weight="700" fill="#FBF7EE" text-anchor="middle">△</text>
      <circle cx="615" cy="21" r="13" fill="#D4A574"/><text x="615" y="26" font-size="14" font-weight="700" fill="#FBF7EE" text-anchor="middle">△</text>
      <text x="725" y="27" font-size="15" font-weight="700" fill="#A05A3E" text-anchor="middle">0–1/5</text>
    </g>

    <!-- 行 4: 财务 -->
    <g transform="translate(0, 176)">
      <rect x="0" y="0" width="780" height="42" fill="#F5F0E3" stroke="#E5DFD0" stroke-width="1"/>
      <text x="60" y="27" font-size="14" font-weight="600" fill="#1F2522" text-anchor="middle">财务</text>
      <circle cx="175" cy="21" r="13" fill="#3D6B54"/><text x="175" y="26" font-size="14" font-weight="700" fill="#FBF7EE" text-anchor="middle">✓</text>
      <circle cx="285" cy="21" r="13" fill="#3D6B54"/><text x="285" y="26" font-size="14" font-weight="700" fill="#FBF7EE" text-anchor="middle">✓</text>
      <circle cx="395" cy="21" r="13" fill="#D4A574"/><text x="395" y="26" font-size="14" font-weight="700" fill="#FBF7EE" text-anchor="middle">△</text>
      <circle cx="505" cy="21" r="13" fill="#3D6B54"/><text x="505" y="26" font-size="14" font-weight="700" fill="#FBF7EE" text-anchor="middle">✓</text>
      <circle cx="615" cy="21" r="13" fill="#D4A574"/><text x="615" y="26" font-size="14" font-weight="700" fill="#FBF7EE" text-anchor="middle">△</text>
      <text x="725" y="27" font-size="15" font-weight="700" fill="#1F2522" text-anchor="middle">3/5</text>
    </g>

    <!-- 行 5: 市场研究 -->
    <g transform="translate(0, 218)">
      <rect x="0" y="0" width="780" height="42" fill="#FFFDF7" stroke="#E5DFD0" stroke-width="1"/>
      <text x="60" y="27" font-size="14" font-weight="600" fill="#1F2522" text-anchor="middle">市场研究</text>
      <circle cx="175" cy="21" r="13" fill="#D4A574"/><text x="175" y="26" font-size="14" font-weight="700" fill="#FBF7EE" text-anchor="middle">△</text>
      <circle cx="285" cy="21" r="13" fill="#D4A574"/><text x="285" y="26" font-size="14" font-weight="700" fill="#FBF7EE" text-anchor="middle">△</text>
      <circle cx="395" cy="21" r="13" fill="#A05A3E"/><text x="395" y="26" font-size="14" font-weight="700" fill="#FBF7EE" text-anchor="middle">✗</text>
      <circle cx="505" cy="21" r="13" fill="#D4A574"/><text x="505" y="26" font-size="14" font-weight="700" fill="#FBF7EE" text-anchor="middle">△</text>
      <circle cx="615" cy="21" r="13" fill="#A05A3E"/><text x="615" y="26" font-size="14" font-weight="700" fill="#FBF7EE" text-anchor="middle">✗</text>
      <text x="725" y="27" font-size="15" font-weight="700" fill="#A05A3E" text-anchor="middle">0–1/5</text>
    </g>
  </g>
</svg>
