<svg viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif">
  <!-- 背景 -->
  <rect width="900" height="360" fill="#FFFFFF"/>

  <!-- 标题 -->
  <text x="450" y="38" font-size="22" font-weight="700" text-anchor="middle" fill="#0F172A">Agent 商业化 5 维度 × 5 场景对比</text>
  <text x="450" y="62" font-size="12" text-anchor="middle" fill="#64748B">✓ 满足 · △ 部分满足 · ✗ 不满足</text>

  <g transform="translate(60, 85)">
    <!-- 表头 -->
    <rect x="0" y="0" width="780" height="42" fill="#1E293B" rx="4"/>
    <text x="60" y="27" fill="white" font-size="13" font-weight="600" text-anchor="middle">场景</text>
    <text x="175" y="27" fill="white" font-size="13" font-weight="600" text-anchor="middle">高频需求</text>
    <text x="285" y="27" fill="white" font-size="13" font-weight="600" text-anchor="middle">数字化工作流</text>
    <text x="395" y="27" fill="white" font-size="13" font-weight="600" text-anchor="middle">可验证结果</text>
    <text x="505" y="27" fill="white" font-size="13" font-weight="600" text-anchor="middle">可量化 ROI</text>
    <text x="615" y="27" fill="white" font-size="13" font-weight="600" text-anchor="middle">成熟付费路径</text>
    <text x="725" y="27" fill="white" font-size="13" font-weight="600" text-anchor="middle">达标项数</text>

    <!-- 行 1: Coding (高亮) -->
    <g transform="translate(0, 50)">
      <rect x="0" y="0" width="780" height="42" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
      <text x="60" y="27" font-size="14" font-weight="700" fill="#1E40AF" text-anchor="middle">Coding</text>
      <circle cx="175" cy="21" r="13" fill="#10B981"/><text x="175" y="26" font-size="14" font-weight="700" fill="white" text-anchor="middle">✓</text>
      <circle cx="285" cy="21" r="13" fill="#10B981"/><text x="285" y="26" font-size="14" font-weight="700" fill="white" text-anchor="middle">✓</text>
      <circle cx="395" cy="21" r="13" fill="#10B981"/><text x="395" y="26" font-size="14" font-weight="700" fill="white" text-anchor="middle">✓</text>
      <circle cx="505" cy="21" r="13" fill="#10B981"/><text x="505" y="26" font-size="14" font-weight="700" fill="white" text-anchor="middle">✓</text>
      <circle cx="615" cy="21" r="13" fill="#10B981"/><text x="615" y="26" font-size="14" font-weight="700" fill="white" text-anchor="middle">✓</text>
      <text x="725" y="27" font-size="15" font-weight="700" fill="#10B981" text-anchor="middle">5/5</text>
    </g>

    <!-- 行 2: 客服 -->
    <g transform="translate(0, 92)">
      <rect x="0" y="0" width="780" height="42" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
      <text x="60" y="27" font-size="14" font-weight="600" fill="#0F172A" text-anchor="middle">客服</text>
      <circle cx="175" cy="21" r="13" fill="#10B981"/><text x="175" y="26" font-size="14" font-weight="700" fill="white" text-anchor="middle">✓</text>
      <circle cx="285" cy="21" r="13" fill="#10B981"/><text x="285" y="26" font-size="14" font-weight="700" fill="white" text-anchor="middle">✓</text>
      <circle cx="395" cy="21" r="13" fill="#F59E0B"/><text x="395" y="26" font-size="14" font-weight="700" fill="white" text-anchor="middle">△</text>
      <circle cx="505" cy="21" r="13" fill="#10B981"/><text x="505" y="26" font-size="14" font-weight="700" fill="white" text-anchor="middle">✓</text>
      <circle cx="615" cy="21" r="13" fill="#10B981"/><text x="615" y="26" font-size="14" font-weight="700" fill="white" text-anchor="middle">✓</text>
      <text x="725" y="27" font-size="15" font-weight="700" fill="#0F172A" text-anchor="middle">4/5</text>
    </g>

    <!-- 行 3: 法律 -->
    <g transform="translate(0, 134)">
      <rect x="0" y="0" width="780" height="42" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
      <text x="60" y="27" font-size="14" font-weight="600" fill="#0F172A" text-anchor="middle">法律</text>
      <circle cx="175" cy="21" r="13" fill="#F59E0B"/><text x="175" y="26" font-size="14" font-weight="700" fill="white" text-anchor="middle">△</text>
      <circle cx="285" cy="21" r="13" fill="#F59E0B"/><text x="285" y="26" font-size="14" font-weight="700" fill="white" text-anchor="middle">△</text>
      <circle cx="395" cy="21" r="13" fill="#EF4444"/><text x="395" y="26" font-size="14" font-weight="700" fill="white" text-anchor="middle">✗</text>
      <circle cx="505" cy="21" r="13" fill="#F59E0B"/><text x="505" y="26" font-size="14" font-weight="700" fill="white" text-anchor="middle">△</text>
      <circle cx="615" cy="21" r="13" fill="#F59E0B"/><text x="615" y="26" font-size="14" font-weight="700" fill="white" text-anchor="middle">△</text>
      <text x="725" y="27" font-size="15" font-weight="700" fill="#EF4444" text-anchor="middle">0–1/5</text>
    </g>

    <!-- 行 4: 财务 -->
    <g transform="translate(0, 176)">
      <rect x="0" y="0" width="780" height="42" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
      <text x="60" y="27" font-size="14" font-weight="600" fill="#0F172A" text-anchor="middle">财务</text>
      <circle cx="175" cy="21" r="13" fill="#10B981"/><text x="175" y="26" font-size="14" font-weight="700" fill="white" text-anchor="middle">✓</text>
      <circle cx="285" cy="21" r="13" fill="#10B981"/><text x="285" y="26" font-size="14" font-weight="700" fill="white" text-anchor="middle">✓</text>
      <circle cx="395" cy="21" r="13" fill="#F59E0B"/><text x="395" y="26" font-size="14" font-weight="700" fill="white" text-anchor="middle">△</text>
      <circle cx="505" cy="21" r="13" fill="#10B981"/><text x="505" y="26" font-size="14" font-weight="700" fill="white" text-anchor="middle">✓</text>
      <circle cx="615" cy="21" r="13" fill="#F59E0B"/><text x="615" y="26" font-size="14" font-weight="700" fill="white" text-anchor="middle">△</text>
      <text x="725" y="27" font-size="15" font-weight="700" fill="#0F172A" text-anchor="middle">3/5</text>
    </g>

    <!-- 行 5: 市场研究 -->
    <g transform="translate(0, 218)">
      <rect x="0" y="0" width="780" height="42" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
      <text x="60" y="27" font-size="14" font-weight="600" fill="#0F172A" text-anchor="middle">市场研究</text>
      <circle cx="175" cy="21" r="13" fill="#F59E0B"/><text x="175" y="26" font-size="14" font-weight="700" fill="white" text-anchor="middle">△</text>
      <circle cx="285" cy="21" r="13" fill="#F59E0B"/><text x="285" y="26" font-size="14" font-weight="700" fill="white" text-anchor="middle">△</text>
      <circle cx="395" cy="21" r="13" fill="#EF4444"/><text x="395" y="26" font-size="14" font-weight="700" fill="white" text-anchor="middle">✗</text>
      <circle cx="505" cy="21" r="13" fill="#F59E0B"/><text x="505" y="26" font-size="14" font-weight="700" fill="white" text-anchor="middle">△</text>
      <circle cx="615" cy="21" r="13" fill="#EF4444"/><text x="615" y="26" font-size="14" font-weight="700" fill="white" text-anchor="middle">✗</text>
      <text x="725" y="27" font-size="15" font-weight="700" fill="#EF4444" text-anchor="middle">0–1/5</text>
    </g>
  </g>
</svg>
