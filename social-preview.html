<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Preview · 分享图检查</title>
  <style>
    :root {
      --bg: #FBF7EE;
      --ink: #1F2522;
      --moss: #5D7052;
      --muted: #687168;
      --line: #E5DFD0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, "PingFang SC", sans-serif;
      background: var(--bg);
      color: var(--ink);
      padding: 32px 24px 48px;
    }
    h1 { font-size: 22px; margin: 0 0 8px; }
    p { color: var(--muted); line-height: 1.6; max-width: 720px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      margin-top: 28px;
    }
    .card {
      background: #FFFDF7;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(31, 37, 34, 0.06);
    }
    .card h2 {
      margin: 0 0 12px;
      font-size: 15px;
      color: var(--moss);
      letter-spacing: 0.04em;
    }
    .card img {
      width: 100%;
      height: auto;
      border-radius: 10px;
      border: 1px solid var(--line);
      display: block;
      background: #fff;
    }
    .icon-row {
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
    }
    .icon-row figure {
      margin: 0;
      text-align: center;
    }
    .icon-row img {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      border: 1px solid var(--line);
    }
    .icon-row figcaption {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
    }
    .compare img { max-height: 220px; object-fit: contain; }
    code {
      display: block;
      margin-top: 10px;
      padding: 10px 12px;
      background: rgba(93, 112, 82, 0.08);
      border-radius: 8px;
      font-size: 11px;
      word-break: break-all;
      color: var(--moss);
    }
    .note {
      margin-top: 24px;
      padding: 14px 16px;
      border-left: 3px solid var(--moss);
      background: rgba(93, 112, 82, 0.08);
      border-radius: 0 10px 10px 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>分享图 & 图标检查页</h1>
  <p>用于本地预览 favicon、Apple Touch Icon、OG 图与 Twitter Card。当前 OG 使用 <strong>蓝底证件照</strong>，粉底版备份见 <code>og-portrait-pink.jpg</code>。</p>

  <div class="grid">
    <section class="card">
      <h2>OG / Twitter Card（1200×630 · 当前版）</h2>
      <img src="./assets/og-image.png?v=20260521-2" alt="当前 OG 图">
      <code>og:image → assets/og-image.png</code>
    </section>

    <section class="card compare">
      <h2>OG 旧版对比（证件照蓝底）</h2>
      <img src="./assets/og-image-v1-legacy.png" alt="旧版 OG 图">
      <code>备份 · og-image-v1-legacy.png</code>
    </section>

    <section class="card">
      <h2>Favicon & Apple Touch</h2>
      <div class="icon-row">
        <figure>
          <img src="./assets/favicon-32.png" width="32" height="32" alt="favicon 32">
          <figcaption>32×32 PNG</figcaption>
        </figure>
        <figure>
          <img src="./assets/favicon.ico" width="32" height="32" alt="favicon ico">
          <figcaption>favicon.ico</figcaption>
        </figure>
        <figure>
          <img src="./assets/apple-touch-icon.png" width="180" height="180" alt="apple touch">
          <figcaption>180×180</figcaption>
        </figure>
      </div>
    </section>
  </div>

  <div class="note">
    若不满意当前 OG 图，可说明想换的照片（例如只用头像、不要右侧人像、改文案等），我可以再出一版。
  </div>
</body>
</html>
